name: level-up

services:
    web:
        image: nginx:alpine
        ports:
            - "9001:80"
        environment:
            - VIRTUAL_HOST=api.level-up.test
            - VIRTUAL_PORT=80
        volumes:
            - ./:/var/www/html
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
        networks:
            - internal
        depends_on:
            - app

    app:
        build:
            context: .
            dockerfile: docker/php/Dockerfile
        user: "1000:1000"
        environment:
            - TMPDIR=/var/www/html/storage/framework/views
            - TEMP=/var/www/html/storage/framework/views
        volumes:
            - ./:/var/www/html
        networks:
            - internal
        depends_on:
            - postgres
            - redis

    postgres:
        image: postgres:16-alpine
        environment:
            POSTGRES_DB: ${DB_DATABASE:-level_up}
            POSTGRES_USER: ${DB_USERNAME:-root}
            POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
        volumes:
            - db-data:/var/lib/postgresql/data
        networks:
            - internal

    redis:
        image: redis:alpine
        volumes:
            - redis-data:/data
        networks:
            - internal

    queue:
        build:
            context: .
            dockerfile: docker/php/Dockerfile
        user: "1000:1000"
        command: php artisan horizon
        volumes:
            - ./:/var/www/html
        networks:
            - internal
        depends_on:
            - app
            - redis

    scheduler:
        build:
            context: .
            dockerfile: docker/php/Dockerfile
        user: "1000:1000"
        command: sh -c "while true; do php artisan schedule:run --no-interaction & sleep 60; done"
        volumes:
            - ./:/var/www/html
        networks:
            - internal
        depends_on:
            - app

    reverb:
        build:
            context: .
            dockerfile: docker/php/Dockerfile
        user: "1000:1000"
        entrypoint: []
        command: php artisan reverb:start --host=0.0.0.0 --port=8080
        environment:
            - VIRTUAL_HOST=ws.level-up.test
            - VIRTUAL_PORT=8080
        volumes:
            - ./:/var/www/html
        networks:
            - internal
        depends_on:
            - app
            - redis

networks:
    internal:
        driver: bridge

volumes:
    db-data:
        driver: local
    redis-data:
        driver: local
